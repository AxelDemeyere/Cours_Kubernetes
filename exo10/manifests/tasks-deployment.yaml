apiVersion: apps/v1
kind: Deployment

metadata:
  name: tasks-deployment
  namespace: fullstack

spec:
  replicas: 1
  selector:
    matchLabels:
      app: tasks
  template:
    metadata:
      labels:
        app: tasks
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - exo10-worker
      volumes:
        - name: tasks-storage
          persistentVolumeClaim:
            claimName: tasks-pvc
      initContainers:
        - name: init-tasks-file
          image: busybox:1.36
          command: ['sh', '-c', 'touch /app/tasks/tasks.txt']
          volumeMounts:
            - name: tasks-storage
              mountPath: /app/tasks
      containers:
        - name: tasks
          image: tasks-api:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: auth-access-configmap
          env:
            - name: TASKS_FOLDER
              value: tasks  # path.join(__dirname, 'tasks', 'tasks.txt') → /app/tasks/tasks.txt
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: tasks-storage
              mountPath: /app/tasks

