apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-france

spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-france
      tier: frontend
  template:
    metadata:
      labels:
        app: nginx-france
        tier: frontend
    spec:
      tolerations:
        - key: "country"
          operator: "Equal"
          value: "france"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "country"
                    operator: "In"
                    values: ["france"]
      containers:
        - name: nginx-france
          image: nginx:alpine
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---

apiVersion: v1
kind: Service

metadata:
  name: service-france

spec:
  type: NodePort
  selector:
    app: nginx-france
    tier: frontend
  ports:
    - port: 80        # Port dans le Service
      targetPort: 80  # Port dans le Pod
      nodePort: 30080 # (30 000 - 32 767)

