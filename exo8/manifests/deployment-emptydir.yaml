apiVersion: apps/v1
kind: Deployment

metadata:
  name: log-api

spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-api
  template:
    metadata:
      labels:
        app: log-api
    spec:
      restartPolicy: Always
      volumes:
        - name: logs-volume
          emptyDir: {}
      containers:
        - name: log-api
          image: log-api:v1
          imagePullPolicy: Never
          command: ["python", "-c", "from app import app; app.run(host='0.0.0.0', port=5000, threaded=False)"]
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: logs-volume
              mountPath: /app/logs

